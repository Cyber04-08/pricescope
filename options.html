<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PriceScope Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="options-container">
    <h1>📊 PriceScope Settings</h1>

    <div class="field-group">
      <label for="keepa-key">Keepa API Key</label>
      <div class="input-row">
        <input type="password" id="keepa-key" placeholder="Your Keepa API key">
        <button id="test-keepa">Test</button>
      </div>
      <span class="hint">Get your key at <a href="https://keepa.com/#!api" target="_blank">keepa.com</a></span>
      <div id="keepa-status" class="status-msg"></div>
    </div>

    <div class="field-group">
      <label for="claude-key">Anthropic API Key</label>
      <div class="input-row">
        <input type="password" id="claude-key" placeholder="sk-ant-...">
        <button id="test-claude">Test</button>
      </div>
      <span class="hint">Get your key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></span>
      <div id="claude-status" class="status-msg"></div>
    </div>

    <div id="save-row">
      <button id="save-btn">Save Settings</button>
      <span id="save-confirm" class="hidden">✓ Saved!</span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
